<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="dots-bg">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
</div>

<div class="container">
    <header class="header">
        <h1 class="logo">URL Shortener</h1>
        <p class="subtitle">Make your links shorter</p>
    </header>

    <main>
        <div class="card">
            <form id="urlForm" class="url-form">
                <div class="form-group">
                    <label for="url">Original URL</label>
                    <input
                            type="url"
                            id="url"
                            name="url"
                            placeholder="https://example.com/very/long/url"
                            required
                            autocomplete="off"
                    >
                </div>

                <div class="form-group">
                    <label for="alias">Custom alias (optional)</label>
                    <input
                            type="text"
                            id="alias"
                            name="alias"
                            placeholder="my-custom-link"
                            autocomplete="off"
                    >
                    <small class="input-hint">Letters, numbers, hyphens and underscores only</small>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <span class="btn-text">Shorten URL</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div id="result" class="result">
                <div class="result-header">
                    <span class="result-icon">✓</span>
                    <h3>Your short URL</h3>
                </div>
                <div class="result-content">
                    <div class="short-url-container">
                        <input type="text" id="shortUrl" readonly class="short-url-input">
                        <button id="copyBtn" class="btn-copy">Copy</button>
                    </div>
                    <div class="original-url">
                        <span class="label">Original:</span>
                        <span id="originalUrl"></span>
                    </div>
                </div>
            </div>

            <div id="error" class="error">
                <span class="error-icon">!</span>
                <span id="errorMessage"></span>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>URL Shortener</p>
    </footer>
</div>

<div id="toast" class="toast">Copied!</div>

<script src="/static/script.js"></script>
</body>
</html>
